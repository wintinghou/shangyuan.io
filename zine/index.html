<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>節典元年</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; background-color: #1c1917; overscroll-behavior-y: none; }

    body {
      background: #fff;
      color: #1e1e1e;
      font-family: 'Noto Serif TC', Georgia, '宋體', serif;
      overflow-x: hidden;
    }

    /* ── HERO ──────────────────────────────────────── */
    .hero {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    .hero-bg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      animation: hero-pan 32s ease-in-out infinite alternate;
    }
    @keyframes hero-pan {
      0%   { object-position: right center; }
      100% { object-position: left center; }
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
    }
    .hero-title-img {
      height: 62vh;
      width: auto;
      display: block;
      opacity: 0;
      transition: opacity 1.8s ease;
      mix-blend-mode: multiply;
    }
    .hero-title-img.on { opacity: 1; }

    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      opacity: 0;
      transition: opacity 1.4s ease;
    }
    .scroll-hint.on { opacity: 0.35; }
    .scroll-hint__bar {
      width: 1px;
      height: 52px;
      background: linear-gradient(#333 40%, transparent);
      animation: drop 2s ease-in-out infinite;
    }
    @keyframes drop {
      0%   { transform: translateY(-26px); opacity: 0; }
      35%  { opacity: 1; }
      100% { transform: translateY(26px); opacity: 0; }
    }

    /* ── SLIDES ────────────────────────────────────── */
    .slides-wrapper {
      position: relative;
      height: 400vh;
    }
    .slides-pin {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
      background: #fff;
    }
    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.7s ease;
      pointer-events: none;
    }
    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── SLIDE 1 ─── 011 + 獻給文字 ───────────────── */
    .s1-inner {
      font-size: clamp(0.88rem, 1.3vw, 1rem);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.8rem;
    }
    .s1-img {
      width: 12em;
      display: block;
    }
    .s1-text {
      text-align: center;
      font-size: 1em;
      letter-spacing: 0.22em;
      font-weight: 300;
      line-height: 2.8;
      color: #1e1e1e;
    }
    .text-line { display: block; }
    .char {
      display: inline-block;
      opacity: 0;
    }
    .slide-1.animate-chars .char {
      animation: charIn 0.45s ease forwards;
    }
    @keyframes charIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: none; }
    }

    /* ── SLIDE 2 ─── 022 frame + 021 title + 序文 ─── */
    .s2-inner {
      position: absolute;
      inset: 0;
    }
    .s2-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    .s2-title {
      position: absolute;
      top: calc(4rem + 3%);
      left: 4%;
      height: 15%;
      width: auto;
      display: block;
      z-index: 2;
    }
    .s2-text {
      position: absolute;
      bottom: 8%;
      right: 5%;
      width: 52%;
      z-index: 2;
      font-size: clamp(0.78rem, 1.05vw, 0.9rem);
      line-height: 2.25;
      letter-spacing: 0.04em;
      font-weight: 300;
      color: #1e1e1e;
    }
    .sentence {
      display: block;
      margin-bottom: 1.1rem;
      opacity: 0;
      transition: opacity 0.9s ease;
    }
    .sentence:last-child { margin-bottom: 0; }
    .sentence.on { opacity: 1; }

    /* ── SLIDE 3 ─── 003 → index.html ─────────────── */
    .slide-3 {
      background-color: #fff;
      transition: opacity 0.7s ease, background-color 1.3s ease;
    }
    .slide-3.dark { background-color: #111; }
    .slide-3.dark .enter-hint { color: #eee; }
    .slide-3.dark .enter-img { filter: invert(1); }
    .enter-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      text-decoration: none;
      color: #1e1e1e;
    }
    .enter-img {
      height: 44vh;
      width: auto;
      display: block;
      animation: breathe 3.2s ease-in-out infinite;
      transition: filter 1.3s ease;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.022); }
    }
    .enter-hint {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      font-weight: 300;
      opacity: 0.4;
      animation: blink 2.6s ease-in-out infinite;
      transition: color 1.3s ease;
    }
    @keyframes blink {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 0.12; }
    }

    /* ── RESPONSIVE: slide 2 小螢幕 ───────────────── */
    @media (max-width: 640px) {
      .s2-text {
        width: 66%;
        font-size: clamp(0.68rem, 1.85vw, 0.82rem);
        line-height: 2.1;
      }
    }

  </style>

    }
  </style>
</head>

<!-- ── HERO ────────────────────────────────────────── -->
<section class="hero">
  <img class="hero-bg" src="assets/001.png" alt="">
  <div class="hero-overlay">
    <img id="heroTitle" class="hero-title-img" src="assets/002.png" alt="">

<div style="position:relative;z-index:1;background:#fff;">
<!-- ── SLIDES ──────────────────────────────────────── -->
<div class="slides-wrapper" id="slidesWrapper">
  <div class="slides-pin" id="slidesPin">

    <!-- Slide 1: 011 + 獻給當代的城市人 -->
    <div class="slide slide-1" id="slide1">
      <div class="s1-inner">
        <img class="s1-img" src="assets/011.png" alt="">
        <div class="s1-text" id="s1text"></div>
      </div>
    </div>

    <!-- Slide 2: 022 frame + 021 title + 02序 text -->
    <div class="slide slide-2" id="slide2">
      <div class="s2-inner">
        <svg class="s2-frame" viewBox="0 0 820 520" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="44" width="816" height="474" fill="none" stroke="#c8231e" stroke-width="20" vector-effect="non-scaling-stroke"/>
        </svg>
        <img class="s2-title" src="assets/021.png" alt="序">
        <div class="s2-text">
          <span class="sentence">「節祭，到底是什麼東西？」</span>
          <span class="sentence">「所以，做這個可以幹嘛？」</span>
          <span class="sentence">這一年以來，這些的問題不曾少過，想要好好的面對大眾說話，可總是不知道對方是隨口問問還是認真好奇，說太少覺得無法傳達，說太多又怕對方意興闌珊，每每不知從何談起。</span>
          <span class="sentence">於是寫了這樣的一本冊子，復述我們所做的事情，傳遞我們的理念，同時，也想要和正在閱讀的你，建立起一點點的連結。</span>
        </div>
      </div>
    </div>

    <!-- Slide 3: 003 → page1.html -->
    <div class="slide slide-3" id="slide3">
      <a href="page1.html" class="enter-link">
        <img src="assets/003.png" alt="節典元年" class="enter-img">
        <span class="enter-hint">點擊進入</span>
      </a>
    </div>

  </div>
</div>


<script>
  // Hero entrance
  setTimeout(() => document.getElementById('heroTitle').classList.add('on'), 700);
  setTimeout(() => document.getElementById('scrollHint').classList.add('on'), 1700);

  // Build char-by-char spans for slide 1
  const s1textEl = document.getElementById('s1text');
  const s1lines  = ['獻給當代的城市人', '與', '尚未出生的孩子們'];
  let ci = 0;
  s1lines.forEach(line => {
    const div = document.createElement('div');
    div.className = 'text-line';
    [...line].forEach(ch => {
      const sp = document.createElement('span');
      sp.className = 'char';
      sp.textContent = ch;
      sp.style.animationDelay = `${ci * 0.09}s`;
      div.appendChild(sp);
      ci++;
    });
    s1textEl.appendChild(div);
    ci += 3; // pause between lines
  });

  // Slide scroll logic
  const wrapper   = document.getElementById('slidesWrapper');
  const slides    = document.querySelectorAll('.slide');
  const sentences = document.querySelectorAll('.sentence');
  let slide2Ready = false;

  function updateSlides() {
    const scrolled    = Math.max(0, -wrapper.getBoundingClientRect().top);
    const totalScroll = wrapper.offsetHeight - window.innerHeight;
    const progress    = totalScroll > 0 ? Math.min(scrolled / totalScroll, 1) : 0;

    // Slide 2 spans 1/3–2/3 of total progress; each sentence appears at an evenly-spaced scroll threshold
    const segStart = 1 / slides.length;
    const segSize  = 1 / slides.length;
    const n        = sentences.length;
    sentences.forEach((s, i) => {
      if (progress >= segStart + segSize * (i + 1) / (n + 1)) s.classList.add('on');
    });
    if (progress >= segStart + segSize * n / (n + 1)) slide2Ready = true;

    let activeIdx = Math.min(Math.floor(progress * slides.length), slides.length - 1);
    if (activeIdx >= 2 && !slide2Ready) activeIdx = 1;

    slides.forEach((s, i) => s.classList.toggle('active', i === activeIdx));
  }

  // Trigger slide 1 char animation when slides section first enters viewport
  new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) {
      setTimeout(() => document.getElementById('slide1').classList.add('animate-chars'), 200);
    }
  }, { threshold: 0.05 }).observe(document.getElementById('slidesPin'));

  window.addEventListener('scroll', updateSlides, { passive: true });
  updateSlides();

  // Slide 3: background darkens only when hovering the 003 image
  const slide3El   = document.getElementById('slide3');
  const enterImgEl = slide3El.querySelector('.enter-img');
  enterImgEl.addEventListener('mouseenter', () => slide3El.classList.add('dark'));
  enterImgEl.addEventListener('mouseleave', () => slide3El.classList.remove('dark'));
</script>
