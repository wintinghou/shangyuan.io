<?xml version="1.0" encoding="UTF-8" standalone="no"?><!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd"><svg width="100%" height="100%" viewBox="0 0 1772 2481" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xml:space="preserve" xmlns:serif="http://www.serif.com/" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linejoin:round;stroke-miterlimit:2;"><rect x="0" y="0" width="1771.654" height="2480.315" style="fill:#fff;"/><g transform="matrix(0.5,0,0,0.5,260.333333,726.350533)"><text x="71px" y="291.262px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:108.333px;">「節</text><text x="287.667px" y="291.262px" style="font-family:'PingFangTC-Light', 'PingFang TC', sans-serif;font-weight:300;font-size:108.333px;">・</text><text x="396px" y="291.262px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:108.333px;">⼀元」⽂化實驗計畫，是蟬⾬越讀第⼀年進</text><text x="71px" y="441.262px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:108.333px;">⾏<tspan x="178.813px 286.627px 394.44px 502.253px 610.067px 717.88px 825.693px 933.507px 1041.32px 1149.133px 1256.947px 1364.76px 1472.573px 1580.387px 1688.2px 1796.013px 1903.827px 2011.64px 2119.453px 2227.267px 2335.08px 2442.893px " y="441.262px 441.262px 441.262px 441.262px 441.262px 441.262px 441.262px 441.262px 441.262px 441.262px 441.262px 441.262px 441.262px 441.262px 441.262px 441.262px 441.262px 441.262px 441.262px 441.262px 441.262px 441.262px ">的活動，內容主要觸及藝術、哲學、⼼理、民俗、</tspan></text><text x="71px" y="591.262px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:108.333px;">歷史等範疇，⽬的是藉由書店作為⼀個實踐知識的</text><text x="71px" y="741.262px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:108.333px;">場<tspan x="178.813px 286.627px 394.44px 502.253px 610.067px 717.88px 825.693px 933.507px 1041.32px 1149.133px 1256.947px 1364.76px 1472.573px 1580.387px 1688.2px 1796.013px 1903.827px 2011.64px 2119.453px 2227.267px 2335.08px 2442.893px " y="741.262px 741.262px 741.262px 741.262px 741.262px 741.262px 741.262px 741.262px 741.262px 741.262px 741.262px 741.262px 741.262px 741.262px 741.262px 741.262px 741.262px 741.262px 741.262px 741.262px 741.262px 741.262px ">域，讓⼈知道知識可以變成⾏動、可以「超越」。</tspan></text><text x="71px" y="891.262px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:108.333px;">並藉由時間（節）的形式，重新界定、認識、創造</text><text x="71px" y="1041.262px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:108.333px;">⾃⼰與城市的相處⽅式。具體⽽⾔，我們步⾏遶境</text><text x="71px" y="1191.262px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:108.333px;">於城市，穿梭巷⼜與沿著海濱，試著跟居民互動、</text><text x="71px" y="1341.262px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:108.333px;">傳遞想法，藉由種種儀式、民俗⽂化，互相交換、</text><text x="71px" y="1491.262px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:108.333px;">感受⽣命的況味並思索⼈⽣難題。這本⼩冊⼦作為</text><text x="71px" y="1641.262px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:108.333px;">⼀個簡短回顧，同時提供了簡單的活動介紹，希望</text><text x="71px" y="1791.262px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:108.333px;">更多⼈可以了解這⼀年的故事，提供更多思考碰撞</text><g transform="matrix(108.333333,0,0,108.333333,504.333333,1941.262267)"></g><text x="71px" y="1941.262px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:108.333px;">的機會。</text></g><use xlink:href="#_Image1" x="0" y="0" width="184px" height="120px" transform="matrix(2.083333,0,0,2.083333,192.173417,482.211667)"/><use xlink:href="#_Image2" x="0" y="0" width="154px" height="146px" transform="matrix(1.224504,0,0,1.224504,279.123083,517.822875)"/><defs><image id="_Image1" width="184px" height="120px" xlink:href="data:image/jpeg;base64,"/><image id="_Image2" width="154px" height="146px" xlink:href="data:image/jpeg;base64,"/></defs></svg>