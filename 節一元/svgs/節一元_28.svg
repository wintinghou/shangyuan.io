<?xml version="1.0" encoding="UTF-8" standalone="no"?><!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd"><svg width="100%" height="100%" viewBox="0 0 1772 2481" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xml:space="preserve" xmlns:serif="http://www.serif.com/" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linejoin:round;stroke-miterlimit:2;"><rect x="0" y="0" width="1771.654" height="2480.315" style="fill:#fff;"/><g transform="matrix(0.5,0,0,0.5,260.333333,525.6372)"><text x="71px" y="209.356px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:91.667px;">、</text><text x="71px" y="242.689px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:91.667px;">對於書店是什麼︖蟬⾬越讀可以做為⼀個團隊名嗎︖還是僅作</text><text x="71px" y="376.022px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:91.667px;">為⼀處空間，負責醞釀事件，和讓事件發⽣︖</text><text x="71px" y="642.689px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:91.667px;">累積了這樣的⽂件，讓書店經歷這樣的事件，混亂中還在摸索</text><text x="71px" y="776.022px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:91.667px;">答案。但⼈們如此相聚，付出與協⼒，雪泥鴻⽖，回⾸向來，</text><text x="71px" y="909.356px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:91.667px;">確實難得。最終還是得好好地感謝，這⼀年⼀起有過製作的每</text><text x="71px" y="1042.689px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:91.667px;">個<tspan x="159.468px 247.935px 336.403px 424.87px 513.337px 601.805px 690.272px 778.74px 867.207px 955.675px 1044.142px 1132.61px 1221.077px 1309.545px 1398.012px 1486.48px 1574.947px 1663.415px 1751.882px 1840.35px 1928.817px 2017.285px 2105.752px 2194.22px 2282.688px 2371.155px 2459.623px " y="1042.689px 1042.689px 1042.689px 1042.689px 1042.689px 1042.689px 1042.689px 1042.689px 1042.689px 1042.689px 1042.689px 1042.689px 1042.689px 1042.689px 1042.689px 1042.689px 1042.689px 1042.689px 1042.689px 1042.689px 1042.689px 1042.689px 1042.689px 1042.689px 1042.689px 1042.689px 1042.689px ">獨⽴的名字：謝廷威、朝露、楊詠欣⽼師、龔育誼、歐⼦玄、</tspan></text><text x="71px" y="1176.022px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:91.667px;">王<tspan x="159.468px 247.935px 336.403px 424.87px 513.337px 601.805px 690.272px 778.74px 867.207px 955.675px 1044.142px 1132.61px 1221.077px 1309.545px 1398.012px 1486.48px 1574.947px 1663.415px 1751.882px 1840.35px 1928.817px 2017.285px 2105.752px 2194.22px 2282.688px 2371.155px 2459.623px " y="1176.022px 1176.022px 1176.022px 1176.022px 1176.022px 1176.022px 1176.022px 1176.022px 1176.022px 1176.022px 1176.022px 1176.022px 1176.022px 1176.022px 1176.022px 1176.022px 1176.022px 1176.022px 1176.022px 1176.022px 1176.022px 1176.022px 1176.022px 1176.022px 1176.022px 1176.022px 1176.022px ">康峻、洪歆婷、劉姿妤、謝⼦秦、⿈柏淯、林政諺、劉⼤寬、</tspan></text><text x="71px" y="1309.356px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:91.667px;">孫<tspan x="159.468px 247.935px 336.403px 424.87px 513.337px 601.805px 690.272px 778.74px 867.207px 955.675px 1044.142px 1132.61px 1221.077px 1309.545px 1398.012px 1486.48px 1574.947px 1663.415px 1751.882px 1840.35px 1928.817px 2017.285px 2105.752px 2194.22px 2282.688px 2371.155px 2459.623px " y="1309.356px 1309.356px 1309.356px 1309.356px 1309.356px 1309.356px 1309.356px 1309.356px 1309.356px 1309.356px 1309.356px 1309.356px 1309.356px 1309.356px 1309.356px 1309.356px 1309.356px 1309.356px 1309.356px 1309.356px 1309.356px 1309.356px 1309.356px 1309.356px 1309.356px 1309.356px 1309.356px ">皓廷、劉翊辰、張凱婷、賴又睿、賴妍希、鄭皓允、梁倍滏、</tspan></text><text x="71px" y="1442.689px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:91.667px;">梁倍逢、曾瓘淇、楊潔琳、陳慧升……。</text><text x="71px" y="1709.356px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:91.667px;">同時感謝所有曾經參與的⼈們，不管只是隨意相⾏，是挑根⽵</text><text x="71px" y="1842.689px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:91.667px;">竿<tspan x="159.468px 247.935px 336.403px 424.87px 513.337px 601.805px 690.272px 778.74px 867.207px 955.675px 1044.142px 1132.61px 1221.077px 1309.545px 1398.012px 1486.48px 1574.947px 1663.415px 1751.882px 1840.35px 1928.817px 2017.285px 2105.752px 2194.22px 2282.688px 2371.155px 2459.623px " y="1842.689px 1842.689px 1842.689px 1842.689px 1842.689px 1842.689px 1842.689px 1842.689px 1842.689px 1842.689px 1842.689px 1842.689px 1842.689px 1842.689px 1842.689px 1842.689px 1842.689px 1842.689px 1842.689px 1842.689px 1842.689px 1842.689px 1842.689px 1842.689px 1842.689px 1842.689px 1842.689px ">或敲聲鑼⿎，對我⽽⾔都是難能可貴的相遇，都是⽀撐「節」</tspan></text><text x="71px" y="1976.022px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:91.667px;">未來亦有實現⼀天的動⼒。也祝福任何未來可能會發⽣的，不</text><text x="71px" y="2109.356px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:91.667px;">管是關於「節」，還是更多的可能，皆能成為建構更美時代的</text><text x="71px" y="2242.689px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:91.667px;">事件，持續挑戰與展演。</text><g transform="matrix(91.666667,0,0,91.666667,1537.666667,2509.3556)"></g><text x="71px" y="2509.356px" style="font-family:'STSongti-TC-Light', 'Songti TC';font-weight:300;font-size:91.667px;">由衷感謝讀到這裡，期待下次相遇。</text></g></svg>